---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Integration Test
permissions: { contents: read }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
    paths:
      - .github/workflows/integration-test.yaml
      - .github/chr-versions.json
      - internal/mikrotik/**.go
      - go.mod
      - go.sum
  push:
    branches: ["main"]
    paths:
      - .github/workflows/integration-test.yaml
      - .github/chr-versions.json
      - internal/mikrotik/**.go
      - go.mod
      - go.sum

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.fetch.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Read CHR versions
        id: fetch
        run: |
          {
            echo "matrix<<EOF"
            cat .github/chr-versions.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  integration-test:
    needs: generate-matrix
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure DNS
        run: echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf

      - run: nslookup download.mikrotik.com

      - name: Download and extract CHR image
        if: steps.chr-cache.outputs.cache-hit != 'true'
        run: curl -fL "${{ matrix.download_url }}" -o chr.img.zip